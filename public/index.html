<!DOCTYPE html>
<html>
<head>
  <title>🚜 Smart Tractor Tracker</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body { margin: 0; font-family: Arial; }

    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      font-size: 14px;
    }

    .controls {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      z-index: 1000;
    }

    .controls button {
      margin: 4px 0;
      padding: 6px;
      border: none;
      border-radius: 5px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }

    .alert {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
      z-index: 1000;
    }

    /* ✅ FIX: ensure toggle visible */
    .leaflet-control-layers {
      z-index: 9999 !important;
    }

    @media (max-width: 600px) {
      .panel { font-size: 12px; }
      .controls button { font-size: 12px; width: 110px; }
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  📍 <span id="position">-</span><br>
  🚜 Speed: <span id="speed">-</span><br>
  🛰️ Sats: <span id="sats">-</span><br>
</div>

<div class="controls">
  <button onclick="toggleFollow()">Follow</button>
</div>

<div id="alertBox" class="alert">🚨 Tractor OUTSIDE geofence!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
const map = L.map('map').setView([30.8549, 75.6909], 18);

// ===== STREET =====
const street = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

// ===== SATELLITE =====
const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

// default layer
street.addTo(map);

// ===== TOGGLE CONTROL =====
L.control.layers(
  {
    "Street": street,
    "Satellite": satellite
  },
  {},
  {
    position: 'bottomleft'
  }
).addTo(map);

// ===== VARIABLES =====
let marker;
let follow = true;

// ===== FOLLOW =====
function toggleFollow() {
  follow = !follow;
}

// ===== SOCKET =====
const socket = io();

socket.on("tractorUpdate", (data) => {

  if (!data.lat) return;

  const lat = data.lat;
  const lng = data.lng;

  document.getElementById("position").textContent =
    lat.toFixed(6) + ", " + lng.toFixed(6);

  document.getElementById("speed").textContent =
    (data.speed || 0).toFixed(1);

  document.getElementById("sats").textContent =
    data.sats || 0;

  if (!marker) marker = L.marker([lat, lng]).addTo(map);
  else marker.setLatLng([lat, lng]);

  if (follow) map.panTo([lat, lng]);
});
</script>

</body>
</html>

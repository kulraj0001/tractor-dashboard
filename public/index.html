<!DOCTYPE html>
<html>
<head>
  <title>🚜 Smart Tractor Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 9999;
      font-size: 14px;
    }

    .controls {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      z-index: 9999;
    }

    .controls button {
      margin: 4px 0;
      padding: 6px;
      border: none;
      border-radius: 5px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }

    .alert {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
      z-index: 9999;
    }

    .leaflet-control-layers {
      z-index: 9999 !important;
    }
@media (max-width: 600px) {
  .leaflet-bottom.leaflet-right {
    bottom: 100px !important;
    right: 10px !important;
  }
}

    @media (max-width: 600px) {
      .panel { font-size: 12px; }
      .controls button {
        font-size: 12px;
        width: 115px;
      }
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  📍 <span id="position">-</span><br>
  🚜 Speed: <span id="speed">-</span><br>
  🛰️ Sats: <span id="sats">-</span><br>
  ⏱ Runtime: <span id="runtime">0</span> sec<br>
  📐 Area: <span id="area">0</span> m²<br>
  Mode: <span id="mode">Follow ON</span>
</div>

<div class="controls">
  <button onclick="toggleFollow()">Follow</button>
  <button onclick="startGeofence()">Start Geofence</button>
  <button onclick="finishGeofence()">Finish Geofence</button>
  <button onclick="clearGeofence()">Clear Geofence</button>
  <button onclick="startSelection()">Start Area</button>
  <button onclick="endSelection()">End Area</button>
  <button onclick="clearArea()">Clear Area</button>
  <button onclick="enableNotifications()">Enable Notifications</button>
</div>

<div id="alertBox" class="alert">🚨 Tractor OUTSIDE geofence!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
const map = L.map('map').setView([30.8549, 75.6909], 18);

// ===== MAP LAYERS =====
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

street.addTo(map);

L.control.layers(
  {
    "Street": street,
    "Satellite": satellite
  },
  {},
  { position: 'bottomright' }
).addTo(map);
// ===== SOCKET =====
const socket = io({
  transports: ['websocket']
});

// ===== VARIABLES =====
let marker;
let pathCoords = [];
let polyline = L.polyline([], { color: 'blue' }).addTo(map);

let follow = true;
let alertShown = false;

let geofenceMarkers = [];
let areaMarkers = [];

let geofencePoints = [];
let geofencePolygon = null;
let drawingFence = false;

let selectingArea = false;
let selectedPoints = [];
let areaPolygon = null;

// ===== LOAD SAVED GEOFENCE =====
const savedFence = localStorage.getItem("geofence");
if (savedFence) {
  geofencePoints = JSON.parse(savedFence);
  geofencePolygon = L.polygon(geofencePoints, { color: "red" }).addTo(map);
}

// ===== FOLLOW =====
function toggleFollow() {
  follow = !follow;
  document.getElementById("mode").textContent =
    follow ? "Follow ON" : "Follow OFF";
}

map.on('dragstart zoomstart', () => {
  follow = false;
  document.getElementById("mode").textContent = "Follow OFF";
});

// ===== LIVE DATA FROM WEBSOCKET =====
function handleTractorPoint(data) {
  if (!data || !data.lat || !data.lng) return;

  const lat = data.lat;
  const lng = data.lng;

  document.getElementById("position").textContent =
    lat.toFixed(6) + ", " + lng.toFixed(6);

  document.getElementById("speed").textContent =
    (data.speed || 0).toFixed(1);

  document.getElementById("sats").textContent =
    data.sats || 0;

  if (!marker) marker = L.marker([lat, lng]).addTo(map);
  else marker.setLatLng([lat, lng]);

  pathCoords.push([lat, lng]);
  if (pathCoords.length > 1000) pathCoords.shift();

  polyline.setLatLngs(pathCoords);

  if (geofencePoints.length > 2) {
    const inside = isInsidePolygon([lat, lng], geofencePoints);

    if (!inside && !alertShown) {
      showAlert();
      alertShown = true;
    }

    if (inside && alertShown) {
      hideAlert();
      alertShown = false;
    }
  }

  if (follow) map.panTo([lat, lng]);
}

// Single point support
socket.on("tractorUpdate", (data) => {
  handleTractorPoint(data);
});

// Batch point support
socket.on("tractorBatch", (points) => {
  points.forEach(point => {
    handleTractorPoint(point);
  });
});

// ===== RUNTIME =====
setInterval(async () => {
  try {
    const res = await fetch('/api/runtime');
    const data = await res.json();

    document.getElementById("runtime").textContent =
      (data.runtime / 1000).toFixed(1);
  } catch (err) {
    console.log("Runtime error:", err);
  }
}, 2000);

// ===== ALERT =====
function showAlert() {
  document.getElementById("alertBox").style.display = "block";
}

function hideAlert() {
  document.getElementById("alertBox").style.display = "none";
}

// ===== MAP CLICK =====
map.on('click', function(e) {
  if (drawingFence) {
    const m = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    geofenceMarkers.push(m);
    geofencePoints.push([e.latlng.lat, e.latlng.lng]);
  }

  if (selectingArea) {
    const m = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    areaMarkers.push(m);
    selectedPoints.push([e.latlng.lat, e.latlng.lng]);
  }
});

// ===== GEOFENCE =====
function startGeofence() {
  drawingFence = true;
  geofencePoints = [];

  geofenceMarkers.forEach(m => map.removeLayer(m));
  geofenceMarkers = [];

  alert("Click to draw boundary");
}

function finishGeofence() {
  drawingFence = false;

  if (geofencePoints.length < 3) {
    alert("Need at least 3 points");
    return;
  }

  if (geofencePolygon) map.removeLayer(geofencePolygon);

  geofencePolygon = L.polygon(geofencePoints, { color: "red" }).addTo(map);

  localStorage.setItem("geofence", JSON.stringify(geofencePoints));

  fetch('/api/geofence', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ points: geofencePoints })
  }).catch(err => console.log("Geofence save error:", err));
}

function clearGeofence() {
  if (geofencePolygon) map.removeLayer(geofencePolygon);

  geofenceMarkers.forEach(m => map.removeLayer(m));
  geofenceMarkers = [];

  geofencePoints = [];
  localStorage.removeItem("geofence");

  fetch('/api/geofence', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ points: [] })
  }).catch(err => console.log("Geofence clear error:", err));

  alert("Geofence cleared");
}

// ===== AREA =====
function startSelection() {
  selectingArea = true;
  selectedPoints = [];

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];

  alert("Click points to calculate area");
}

function endSelection() {
  selectingArea = false;

  if (selectedPoints.length < 3) {
    alert("Need 3 points");
    return;
  }

  const area = calculateArea(selectedPoints);
  document.getElementById("area").textContent = area.toFixed(2);

  if (areaPolygon) map.removeLayer(areaPolygon);

  areaPolygon = L.polygon(selectedPoints, { color: "green" }).addTo(map);

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];
}

function clearArea() {
  if (areaPolygon) map.removeLayer(areaPolygon);

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];

  selectedPoints = [];
  document.getElementById("area").textContent = "0";

  alert("Area cleared");
}

// ===== POLYGON CHECK =====
function isInsidePolygon(point, polygon) {
  let x = point[0], y = point[1];
  let inside = false;

  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    let xi = polygon[i][0], yi = polygon[i][1];
    let xj = polygon[j][0], yj = polygon[j][1];

    let intersect =
      ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

// ===== AREA CALCULATION =====
function calculateArea(points) {
  let area = 0;

  for (let i = 0; i < points.length; i++) {
    let j = (i + 1) % points.length;
    area += (points[i][0] * points[j][1] -
             points[j][0] * points[i][1]);
  }

  return Math.abs(area / 2) * 111000 * 111000;
}
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => {
      console.log("✅ Service Worker registered");
    })
    .catch((error) => {
      console.error("❌ Service Worker registration failed:", error);
    });
}
async function enableNotifications() {
  if (!("Notification" in window)) {
    alert("This browser does not support notifications");
    return;
  }

  if (!("serviceWorker" in navigator)) {
    alert("Service Worker not supported");
    return;
  }

  const permission = await Notification.requestPermission();

  if (permission !== "granted") {
    alert("Notifications permission denied");
    return;
  }

  const registration = await navigator.serviceWorker.ready;

  const subscription = await registration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: "BBEoPLnv2vekpNIvdju7yGhW3P5hZiGn1PIPme0CfbVGUPBujYUceBJ1hlU8KOgQVJe0ScUri4cHV-GmVVZKDAQ"
  });

  await fetch('/api/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(subscription)
  });

  alert("Notifications enabled successfully");

  new Notification("🚜 Tractor Tracker", {
    body: "Notifications are now enabled for geofence alerts."
  });
}

 </script>

</body>
</html>

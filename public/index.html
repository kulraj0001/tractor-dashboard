<!DOCTYPE html>
<html>
<head>
  <title>🚜 Smart Tractor Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    #map {
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 9999;
      font-size: 14px;
      line-height: 1.5;
    }

    .width-box {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px;
      border-radius: 8px;
      z-index: 9999;
    }

    .width-box input {
      width: 130px;
      padding: 6px;
      border: 1px solid #aaa;
      border-radius: 5px;
      text-align: center;
    }

    .controls {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      z-index: 9999;
    }

    .controls button {
      margin: 4px 0;
      padding: 6px;
      border: none;
      border-radius: 5px;
      background: #2c7be5;
      color: white;
      cursor: pointer;
    }

    .alert {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      display: none;
      z-index: 9999;
    }

    .leaflet-control-layers {
      z-index: 9999 !important;
    }

    @media (max-width: 600px) {
      .panel {
        font-size: 12px;
      }

      .controls button {
        font-size: 12px;
        width: 115px;
      }

      .width-box {
        top: 10px;
        left: 55%;
      }

      .width-box input {
        width: 105px;
        font-size: 12px;
      }

      .leaflet-bottom.leaflet-right {
        bottom: 100px !important;
        right: 10px !important;
      }
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="width-box">
  <input id="implementWidth" type="number" step="0.1" placeholder="Enter width">
</div>

<div class="panel">
  📍 <span id="position">-</span><br>
  🚜 Speed: <span id="speed">-</span><br>
  🛰️ Sats: <span id="sats">-</span><br>
  ⏱ Runtime: <span id="runtime">0</span> hr<br>
  📏 Distance: <span id="totalDistance">0</span> m<br>
  📐 Area: <span id="area">0</span> m²<br>
  🔁 Overlap: <span id="overlap">0</span>%<br>
  ⚙️ Field Efficiency: <span id="fieldEfficiency">0</span>%<br>
  Mode: <span id="mode">Follow ON</span>
</div>

<div class="controls">
  <button onclick="clearPath()">Clear Path</button>
  <button onclick="toggleFollow()">Follow</button>
  <button onclick="startGeofence()">Start Geofence</button>
  <button onclick="finishGeofence()">Finish Geofence</button>
  <button onclick="clearGeofence()">Clear Geofence</button>
  <button onclick="startSelection()">Start Area</button>
  <button onclick="endSelection()">End Area</button>
  <button onclick="clearArea()">Clear Area</button>
  <button onclick="enableNotifications()">Enable Notifications</button>
</div>

<div id="alertBox" class="alert">🚨 Tractor OUTSIDE geofence!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>
const map = L.map('map', {
  maxZoom: 17
}).setView([30.8549, 75.6909], 16);

// ===== MAP LAYERS =====
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

street.addTo(map);

L.control.layers(
  {
    "Street": street,
    "Satellite": satellite
  },
  {},
  { position: 'bottomright' }
).addTo(map);

// ===== SOCKET =====
const socket = io({
  transports: ["websocket", "polling"],
  upgrade: true,
  reconnection: true,
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000,
  timeout: 20000
});

socket.on("connect", () => {
  console.log("✅ Dashboard connected:", socket.id);
});

socket.on("disconnect", (reason) => {
  console.log("❌ Dashboard disconnected:", reason);
});

socket.on("connect_error", (err) => {
  console.log("❌ Socket error:", err.message);
});

// ===== VARIABLES =====
let marker;
let pathCoords = [];
let polyline = L.polyline([], { color: 'blue' }).addTo(map);

let follow = true;
let alertShown = false;

let geofenceMarkers = [];
let areaMarkers = [];

let geofencePoints = [];
let geofencePolygon = null;
let drawingFence = false;

let selectingArea = false;
let selectedPoints = [];
let areaPolygon = null;

// ===== SMOOTHING VARIABLES =====
let displayLat = null;
let displayLng = null;

let lastPathLat = null;
let lastPathLng = null;

const markerSmoothFactor = 0.25;
const minPathDistance = 3.0;

// ===== DISTANCE + OVERLAP VARIABLES =====
let totalDistance = 0;
let insideFieldDistance = 0;
let fieldArea = 0;

let lastDistanceLat = null;
let lastDistanceLng = null;

let finalOverlapCalculated = false;

// ===== FIELD EFFICIENCY VARIABLES =====
let fieldTimerRunning = false;
let fieldEntryTime = null;
let fieldElapsedMs = 0;

let speedSumInsideField = 0;
let speedCountInsideField = 0;

let wasInsideField = false;
let finalFieldEfficiencyCalculated = false;

// ===== LOAD PATH FROM SERVER AFTER REFRESH =====
async function loadServerPath() {
  try {
    const res = await fetch("/api/path");
    const savedPath = await res.json();

    if (Array.isArray(savedPath) && savedPath.length > 0) {
      pathCoords = savedPath;
      polyline.setLatLngs(pathCoords);

      recalculateTotalDistanceFromPath();

      const lastPoint = pathCoords[pathCoords.length - 1];

      lastPathLat = lastPoint[0];
      lastPathLng = lastPoint[1];

      lastDistanceLat = lastPoint[0];
      lastDistanceLng = lastPoint[1];

      displayLat = lastPoint[0];
      displayLng = lastPoint[1];

      if (!marker) {
        marker = L.marker(lastPoint).addTo(map);
      } else {
        marker.setLatLng(lastPoint);
      }

      map.panTo(lastPoint);

      console.log("✅ Server path loaded:", savedPath.length);
    }
  } catch (err) {
    console.log("Path load error:", err);
  }
}

loadServerPath();

// ===== LOAD SAVED GEOFENCE =====
const savedFence = localStorage.getItem("geofence");

if (savedFence) {
  geofencePoints = JSON.parse(savedFence);
  geofencePolygon = L.polygon(geofencePoints, { color: "red" }).addTo(map);
}

// ===== FOLLOW =====
function toggleFollow() {
  follow = !follow;

  document.getElementById("mode").textContent =
    follow ? "Follow ON" : "Follow OFF";
}

map.on('dragstart zoomstart', () => {
  follow = false;
  document.getElementById("mode").textContent = "Follow OFF";
});

// ===== DISTANCE FUNCTION =====
function distanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;

  const p1 = lat1 * Math.PI / 180;
  const p2 = lat2 * Math.PI / 180;

  const dp = (lat2 - lat1) * Math.PI / 180;
  const dl = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dp / 2) * Math.sin(dp / 2) +
    Math.cos(p1) * Math.cos(p2) *
    Math.sin(dl / 2) * Math.sin(dl / 2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function smoothValue(oldValue, newValue, factor) {
  if (oldValue === null) return newValue;
  return oldValue + (newValue - oldValue) * factor;
}

// ===== RECALCULATE TOTAL DISTANCE FROM SERVER PATH =====
function recalculateTotalDistanceFromPath() {
  totalDistance = 0;

  if (!pathCoords || pathCoords.length < 2) {
    document.getElementById("totalDistance").textContent = "0";
    return;
  }

  for (let i = 1; i < pathCoords.length; i++) {
    totalDistance += distanceMeters(
      pathCoords[i - 1][0],
      pathCoords[i - 1][1],
      pathCoords[i][0],
      pathCoords[i][1]
    );
  }

  document.getElementById("totalDistance").textContent =
    totalDistance.toFixed(2);
}

// ===== OVERLAP DISPLAY =====
// showFinal = false means count internally but do not show overlap yet.
// showFinal = true means tractor has left field and final overlap is displayed.
function updateOverlapDisplay(showFinal = false) {
  const width = parseFloat(document.getElementById("implementWidth").value);

  document.getElementById("totalDistance").textContent =
    totalDistance.toFixed(2);

  if (!showFinal) {
    document.getElementById("overlap").textContent = "0";
    return;
  }

  if (!width || width <= 0 || fieldArea <= 0) {
    document.getElementById("overlap").textContent = "0";
    return;
  }

  const cultivatedArea = insideFieldDistance * width;

  const overlapPercent =
    ((cultivatedArea - fieldArea) / fieldArea) * 100;

  document.getElementById("overlap").textContent =
    overlapPercent.toFixed(2);
}

// ===== FIELD EFFICIENCY DISPLAY =====
// showFinal = false means keep display 0 while tractor is inside field.
// showFinal = true means tractor has left field and final efficiency is displayed.
function updateFieldEfficiencyDisplay(showFinal = false) {
  const width = parseFloat(document.getElementById("implementWidth").value);

  if (!showFinal) {
    document.getElementById("fieldEfficiency").textContent = "0";
    return;
  }

  if (!width || width <= 0 || fieldArea <= 0) {
    document.getElementById("fieldEfficiency").textContent = "0";
    return;
  }

  let totalFieldTimeMs = fieldElapsedMs;

  if (fieldTimerRunning && fieldEntryTime) {
    totalFieldTimeMs += Date.now() - fieldEntryTime;
  }

  const fieldTimeHours = totalFieldTimeMs / (1000 * 60 * 60);

  if (fieldTimeHours <= 0 || speedCountInsideField <= 0) {
    document.getElementById("fieldEfficiency").textContent = "0";
    return;
  }

  const averageSpeed = speedSumInsideField / speedCountInsideField; // km/h

  if (averageSpeed <= 0) {
    document.getElementById("fieldEfficiency").textContent = "0";
    return;
  }

  const actualAreaHa = fieldArea / 10000; // m² to hectare

  const actualFieldCapacity = actualAreaHa / fieldTimeHours; // ha/h

  const theoreticalFieldCapacity = (averageSpeed * width) / 10; // ha/h

  if (theoreticalFieldCapacity <= 0) {
    document.getElementById("fieldEfficiency").textContent = "0";
    return;
  }

  const fieldEfficiency =
    (actualFieldCapacity / theoreticalFieldCapacity) * 100;

  document.getElementById("fieldEfficiency").textContent =
    fieldEfficiency.toFixed(2);
}

// ===== FIELD EFFICIENCY TIMER =====
function updateFieldEfficiencyState(isInsideField, speed) {
  const now = Date.now();

  if (selectedPoints.length < 3 || fieldArea <= 0) {
    return;
  }

  if (isInsideField && !fieldTimerRunning) {
    fieldTimerRunning = true;
    fieldEntryTime = now;
    finalFieldEfficiencyCalculated = false;
    console.log("⏱ Field timer started");
  }

  if (isInsideField) {
    speedSumInsideField += parseFloat(speed) || 0;
    speedCountInsideField++;
  }

  if (!isInsideField && fieldTimerRunning) {
    fieldElapsedMs += now - fieldEntryTime;
    fieldEntryTime = null;
    fieldTimerRunning = false;

    updateFieldEfficiencyDisplay(true);
    finalFieldEfficiencyCalculated = true;

    console.log("⏱ Field timer stopped");
    console.log("✅ Final field efficiency calculated after leaving field");
  }

  wasInsideField = isInsideField;
}

// ===== RESET FIELD EFFICIENCY =====
function resetFieldEfficiency() {
  fieldTimerRunning = false;
  fieldEntryTime = null;
  fieldElapsedMs = 0;

  speedSumInsideField = 0;
  speedCountInsideField = 0;

  wasInsideField = false;
  finalFieldEfficiencyCalculated = false;

  document.getElementById("fieldEfficiency").textContent = "0";
}

// Width affects final overlap and final field efficiency
document.getElementById("implementWidth").addEventListener("input", () => {
  if (finalOverlapCalculated) {
    updateOverlapDisplay(true);
  }

  if (finalFieldEfficiencyCalculated) {
    updateFieldEfficiencyDisplay(true);
  }
});

// ===== LIVE DATA FROM WEBSOCKET =====
socket.on("tractorUpdate", (data) => {
  if (!data || !data.lat || !data.lng) return;

  const lat = data.lat;
  const lng = data.lng;

  document.getElementById("position").textContent =
    lat.toFixed(6) + ", " + lng.toFixed(6);

  document.getElementById("speed").textContent =
    (data.speed || 0).toFixed(1);

  document.getElementById("sats").textContent =
    data.sats || 0;

  // ===== SMOOTH MARKER POSITION =====
  displayLat = smoothValue(displayLat, lat, markerSmoothFactor);
  displayLng = smoothValue(displayLng, lng, markerSmoothFactor);

  if (!marker) {
    marker = L.marker([displayLat, displayLng]).addTo(map);
  } else {
    marker.setLatLng([displayLat, displayLng]);
  }

  // ===== SMOOTH PATH DRAWING =====
  if (lastPathLat === null || lastPathLng === null) {
    pathCoords.push([displayLat, displayLng]);
    lastPathLat = displayLat;
    lastPathLng = displayLng;
  } else {
    const moved = distanceMeters(
      lastPathLat,
      lastPathLng,
      displayLat,
      displayLng
    );

    if (moved >= minPathDistance) {
      pathCoords.push([displayLat, displayLng]);
      lastPathLat = displayLat;
      lastPathLng = displayLng;
    }
  }

  if (pathCoords.length > 1000) {
    pathCoords.shift();
  }

  polyline.setLatLngs(pathCoords);

  // ===== CHECK IF INSIDE SELECTED FIELD AREA =====
  let insideSelectedArea = false;

  if (selectedPoints.length > 2) {
    insideSelectedArea = isInsidePolygon(
      [displayLat, displayLng],
      selectedPoints
    );
  }

  // ===== TOTAL DISTANCE + INSIDE FIELD DISTANCE =====
  if (lastDistanceLat !== null && lastDistanceLng !== null) {
    const segmentDistance = distanceMeters(
      lastDistanceLat,
      lastDistanceLng,
      displayLat,
      displayLng
    );

    const currentSpeed = parseFloat(data.speed) || 0;
const distanceSpeedLimit = 1.0; // km/h

// Count distance only when tractor is actually moving.
// This prevents stationary GNSS drift from increasing distance.
if (currentSpeed >= distanceSpeedLimit) {
  totalDistance += segmentDistance;

  if (insideSelectedArea) {
    insideFieldDistance += segmentDistance;
    finalOverlapCalculated = false;
  }
}

    // Total distance updates live, overlap remains 0 until tractor leaves field
    updateOverlapDisplay(false);
  }

  lastDistanceLat = displayLat;
  lastDistanceLng = displayLng;

  // ===== FINAL OVERLAP AFTER TRACTOR LEAVES FIELD =====
  // This must run before updateFieldEfficiencyState(), because that function updates wasInsideField.
  if (wasInsideField && !insideSelectedArea && !finalOverlapCalculated) {
    updateOverlapDisplay(true);
    finalOverlapCalculated = true;
    console.log("✅ Final overlap calculated after leaving field");
  }

  // ===== FIELD EFFICIENCY =====
  updateFieldEfficiencyState(insideSelectedArea, data.speed || 0);

  // ===== GEOFENCE ALERT =====
  if (geofencePoints.length > 2) {
    const inside = isInsidePolygon([displayLat, displayLng], geofencePoints);

    if (!inside && !alertShown) {
      showAlert();
      alertShown = true;
    }

    if (inside && alertShown) {
      hideAlert();
      alertShown = false;
    }
  }

  if (follow) {
    map.panTo([displayLat, displayLng]);
  }
});

// ===== RUNTIME =====
setInterval(async () => {
  try {
    const res = await fetch('/api/runtime');
    const data = await res.json();

    document.getElementById("runtime").textContent =
      (data.hours || 0).toFixed(3);
  } catch (err) {
    console.log("Runtime error:", err);
  }
}, 2000);

// ===== RECALCULATE INSIDE FIELD DISTANCE FROM EXISTING PATH =====
function recalculateInsideFieldDistance() {
  insideFieldDistance = 0;

  if (!selectedPoints || selectedPoints.length < 3) return;
  if (!pathCoords || pathCoords.length < 2) return;

  for (let i = 1; i < pathCoords.length; i++) {
    const prev = pathCoords[i - 1];
    const curr = pathCoords[i];

    const midLat = (prev[0] + curr[0]) / 2;
    const midLng = (prev[1] + curr[1]) / 2;

    const segmentDistance = distanceMeters(
      prev[0],
      prev[1],
      curr[0],
      curr[1]
    );

    const inside = isInsidePolygon(
      [midLat, midLng],
      selectedPoints
    );

    if (inside) {
      insideFieldDistance += segmentDistance;
    }
  }
}

// ===== ALERT =====
function showAlert() {
  document.getElementById("alertBox").style.display = "block";
}

function hideAlert() {
  document.getElementById("alertBox").style.display = "none";
}

// ===== MAP CLICK =====
map.on('click', function(e) {
  if (drawingFence) {
    const m = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    geofenceMarkers.push(m);
    geofencePoints.push([e.latlng.lat, e.latlng.lng]);
  }

  if (selectingArea) {
    const m = L.marker([e.latlng.lat, e.latlng.lng]).addTo(map);
    areaMarkers.push(m);
    selectedPoints.push([e.latlng.lat, e.latlng.lng]);
  }
});

// ===== GEOFENCE =====
function startGeofence() {
  drawingFence = true;
  geofencePoints = [];

  geofenceMarkers.forEach(m => map.removeLayer(m));
  geofenceMarkers = [];

  alert("Click to draw boundary");
}

function finishGeofence() {
  drawingFence = false;

  if (geofencePoints.length < 3) {
    alert("Need at least 3 points");
    return;
  }

  if (geofencePolygon) {
    map.removeLayer(geofencePolygon);
  }

  geofencePolygon = L.polygon(geofencePoints, { color: "red" }).addTo(map);

  localStorage.setItem("geofence", JSON.stringify(geofencePoints));

  fetch('/api/geofence', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ points: geofencePoints })
  }).catch(err => console.log("Geofence save error:", err));
}

function clearGeofence() {
  if (geofencePolygon) {
    map.removeLayer(geofencePolygon);
  }

  geofenceMarkers.forEach(m => map.removeLayer(m));
  geofenceMarkers = [];

  geofencePoints = [];
  localStorage.removeItem("geofence");

  fetch('/api/geofence', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ points: [] })
  }).catch(err => console.log("Geofence clear error:", err));

  alert("Geofence cleared");
}

// ===== AREA =====
function startSelection() {
  selectingArea = true;
  selectedPoints = [];

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];

  alert("Click points to calculate area");
}

function endSelection() {
  selectingArea = false;

  if (selectedPoints.length < 3) {
    alert("Need 3 points");
    return;
  }

  const area = calculateArea(selectedPoints);
  fieldArea = area;

  document.getElementById("area").textContent = area.toFixed(2);

  // Fresh calculation starts after area selection
  insideFieldDistance = 0;
  finalOverlapCalculated = false;

  resetFieldEfficiency();

  document.getElementById("overlap").textContent = "0";
  document.getElementById("fieldEfficiency").textContent = "0";
  updateOverlapDisplay(false);

  if (areaPolygon) {
    map.removeLayer(areaPolygon);
  }

  areaPolygon = L.polygon(selectedPoints, { color: "green" }).addTo(map);

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];
}

function clearArea() {
  if (areaPolygon) {
    map.removeLayer(areaPolygon);
  }

  areaMarkers.forEach(m => map.removeLayer(m));
  areaMarkers = [];

  selectedPoints = [];
  fieldArea = 0;
  insideFieldDistance = 0;
  finalOverlapCalculated = false;

  resetFieldEfficiency();

  document.getElementById("area").textContent = "0";
  document.getElementById("overlap").textContent = "0";
  document.getElementById("fieldEfficiency").textContent = "0";

  alert("Area cleared");
}

async function clearPath() {
  pathCoords = [];
  polyline.setLatLngs([]);

  totalDistance = 0;
  insideFieldDistance = 0;

  lastDistanceLat = null;
  lastDistanceLng = null;

  lastPathLat = null;
  lastPathLng = null;

  finalOverlapCalculated = false;

  document.getElementById("totalDistance").textContent = "0";
  document.getElementById("overlap").textContent = "0";

  updateOverlapDisplay(false);

  try {
    await fetch("/api/path/clear", {
      method: "POST"
    });
  } catch (err) {
    console.log("Server path clear error:", err);
  }

  alert("Path cleared");
}

// ===== POLYGON CHECK =====
function isInsidePolygon(point, polygon) {
  let x = point[0];
  let y = point[1];
  let inside = false;

  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    let xi = polygon[i][0];
    let yi = polygon[i][1];

    let xj = polygon[j][0];
    let yj = polygon[j][1];

    let intersect =
      ((yi > y) !== (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) {
      inside = !inside;
    }
  }

  return inside;
}

// ===== AREA CALCULATION =====
function calculateArea(points) {
  let area = 0;

  for (let i = 0; i < points.length; i++) {
    let j = (i + 1) % points.length;

    area += (
      points[i][0] * points[j][1] -
      points[j][0] * points[i][1]
    );
  }

  return Math.abs(area / 2) * 111000 * 111000;
}

// ===== SERVICE WORKER REGISTER =====
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => {
      console.log("✅ Service Worker registered");
    })
    .catch((error) => {
      console.error("❌ Service Worker registration failed:", error);
    });
}

// ===== PUSH NOTIFICATION HELPER =====
function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, "+")
    .replace(/_/g, "/");

  const rawData = window.atob(base64);
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }

  return outputArray;
}

// ===== ENABLE NOTIFICATIONS =====
async function enableNotifications() {
  const VAPID_PUBLIC_KEY = "BBEoPLnv2vekpNIvdju7yGhW3P5hZiGn1PIPme0CfbVGUPBujYUceBJ1hlU8KOgQVJe0ScUri4cHV-GmVVZKDAQ";

  if (!("Notification" in window)) {
    alert("This browser does not support notifications");
    return;
  }

  if (!("serviceWorker" in navigator)) {
    alert("Service Worker not supported");
    return;
  }

 if (VAPID_PUBLIC_KEY.trim() === "") {
  alert("Add your VAPID public key in index.html first");
  return;
}

  const permission = await Notification.requestPermission();

  if (permission !== "granted") {
    alert("Notifications permission denied");
    return;
  }

  const registration = await navigator.serviceWorker.ready;

  const subscription = await registration.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
  });

  await fetch("/api/subscribe", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(subscription)
  });

  alert("Notifications enabled successfully");
